<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup Member Archive</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Flag Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css"/>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="header-container">
      <h2>🌍 FIFA Member Dataset</h2>
      <nav>
        <button class="nav-btn active" onclick="switchView('members', this)">Members</button>
        <button class="nav-btn" onclick="switchView('years', this)">Timeline</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- MEMBERS VIEW -->
    <section id="members-view">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterConfed('ALL', this)">ALL</button>
        <button class="filter-btn" onclick="filterConfed('UEFA', this)">UEFA</button>
        <button class="filter-btn" onclick="filterConfed('CONMEBOL', this)">CONMEBOL</button>
        <button class="filter-btn" onclick="filterConfed('CONCACAF', this)">CONCACAF</button>
        <button class="filter-btn" onclick="filterConfed('CAF', this)">CAF</button>
        <button class="filter-btn" onclick="filterConfed('AFC', this)">AFC</button>
        <button class="filter-btn" onclick="filterConfed('OFC', this)">OFC</button>
      </div>
      <div id="flag-grid" class="flag-grid"></div>
    </section>

    <!-- TIMELINE/YEARS VIEW -->
    <section id="years-view" class="hidden">
      <div id="years-buttons" class="years-grid-container"></div>
      
      <!-- Year Breakdown Details Area -->
      <div id="year-details" class="year-details-card hidden">
        <div class="timeline-header-row">
          <h3 id="selected-year-title">🏆 Tournament Participants</h3>
          <div class="timeline-tabs">
            <button id="tab-timeline-alpha" class="active" onclick="switchTimelineSubView('alpha', this)">Alphabetical</button>
            <button id="tab-timeline-confed" onclick="switchTimelineSubView('confed', this)">By Confederation</button>
            <button id="tab-timeline-group" onclick="switchTimelineSubView('group', this)">Group Stage</button>
          </div>
        </div>
        <div id="year-participants"></div>
      </div>
    </section>
  </main>

  <!-- HISTORICAL PERFORMANCE MODAL OVERLAY -->
  <div id="chart-modal" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-country-name">Country Performance</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="chart-container">
        <canvas id="historyChart"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
