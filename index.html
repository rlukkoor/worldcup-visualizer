<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup Member Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="header-container">
      <h1>🌍 FIFA Member Dataset</h1>
      <nav>
        <button class="nav-btn active" onclick="switchView('members', this)">Members</button>
        <button class="nav-btn" onclick="switchView('years', this)">Timeline</button>
      </nav>
    </div>
  </header>

  <main>
    <section id="members-view">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterConfed('ALL', this)">ALL</button>
        <button class="filter-btn" onclick="filterConfed('UEFA', this)">UEFA</button>
        <button class="filter-btn" onclick="filterConfed('CONMEBOL', this)">CONMEBOL</button>
        <button class="filter-btn" onclick="filterConfed('CONCACAF', this)">CONCACAF</button>
        <button class="filter-btn" onclick="filterConfed('CAF', this)">CAF</button>
        <button class="filter-btn" onclick="filterConfed('AFC', this)">AFC</button>
        <button class="filter-btn" onclick="filterConfed('OFC', this)">OFC</button>
      </div>
      <div id="flag-grid" class="flag-grid"></div>
    </section>

    <!-- 2. Historical Tournament Timeline View -->
    <section id="years-view" class="hidden">
      <div id="years-buttons" class="years-buttons"></div>

      <div class="timeline-tabs" id="timeline-sub-navigation">
        <button id="tab-timeline-alpha" class="active" onclick="switchTimelineSubView('alpha', this)">Alphabetical</button>
        <button id="tab-timeline-confed" onclick="switchTimelineSubView('confed', this)">By Confederation</button>
        <button id="tab-timeline-third" onclick="switchTimelineSubView('third', this)">By Finish/Stage</button>
      </div>
      
      <div id="year-details" class="year-details hidden">
        <div class="timeline-header-row">
          <h2 id="selected-year-title">🏆 Tournament Participants</h2>
          
          <!-- Sub-view Filtering Tabs inside Timeline -->
          <div class="timeline-tabs">
            <button id="tab-timeline-alpha" class="filter-btn active" onclick="switchTimelineSubView('alpha')">Alphabetical</button>
            <button id="tab-timeline-confed" class="filter-btn" onclick="switchTimelineSubView('confed')">By Confederation</button>
          </div>
        </div>
        
        <!-- Target render output zone -->
        <div id="year-participants"></div>
      </div>
    </section>
  </main>

  <div id="chart-modal" class="modal hidden" onclick="if(event.target === this) closeModal()">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2 id="modal-country-name">Country Performance History</h2>
      <div class="chart-container">
        <canvas id="historyChart"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
